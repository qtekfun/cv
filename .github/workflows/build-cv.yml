name: Build CV PDF

on:
  push:
    branches: [master, main]
    paths:
      - "cv.md"
      - "style.css"
      - ".github/workflows/build-cv.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pandoc and WeasyPrint
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc weasyprint fonts-dejavu

      - name: Build HTML
        run: |
          pandoc cv.md \
            --standalone \
            --css style.css \
            --metadata title="CV" \
            --to html5 \
            -o cv.html

      - name: Build PDF via WeasyPrint
        run: |
          weasyprint cv.html cv.pdf

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cv-pdf
          path: cv.pdf
          retention-days: 30

      - name: Release PDF
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "CV – latest"
          files: cv.pdf
          body: "PDF auto-generated from `cv.md`"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
